name: Deploy site to GitHub Pages

# Публикует папку site/ (лендинг DocBratus) на GitHub Pages.
# После первого запуска включите Pages: Settings → Pages → Source: GitHub Actions.

on:
  push:
    branches:
      - claude/website-app-project-34bfn5
      - main
    paths:
      - 'site/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Разрешаем один параллельный деплой, не отменяя уже запущенный
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
